app = "joydesc"
primary_region = "gru"

[build]

[env]
  PORT = "3000"
  OLLAMA_URL = ""

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "joydesc_data"
  destination = "/data"
